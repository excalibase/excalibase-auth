name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'helm/**'
      - 'devbox/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'helm/**'
      - 'devbox/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Run unit tests
      run: go test ./... -short -count=1

    - name: Run integration tests
      run: go test ./... -count=1 -timeout=120s

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Build binary
      run: CGO_ENABLED=0 go build -o bin/excalibase-auth ./cmd/server/

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: binary
        path: bin/excalibase-auth
        retention-days: 7
