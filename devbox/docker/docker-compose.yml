services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth_admin
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: auth_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_admin -d auth_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "24000:24000"
    environment:
      PORT: "24000"
      PROVISIONING_URL: ${PROVISIONING_URL:-http://host.docker.internal:24005/api}
      PROVISIONING_PAT: ${PROVISIONING_PAT}
    depends_on:
      postgres:
        condition: service_healthy
